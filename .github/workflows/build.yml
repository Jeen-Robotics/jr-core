name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libva-dev \
            libvdpau-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libpulse-dev \
            libasound2-dev \
            protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core/middleware_rs

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Create jr_msgs Conan package
        run: |
          git clone https://github.com/Jeen-Robotics/jr-msgs.git
          conan create jr-msgs/conan --build=missing

      - name: Install dependencies
        run: |
          conan install conanfile.txt \
            --output-folder=build \
            --build=missing \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_RUST_MIDDLEWARE=ON \
            -DBUILD_SANDBOX=OFF \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Rust tests
        working-directory: core/middleware_rs
        run: cargo test --all-features

      - name: Run C++ tests
        working-directory: build
        run: ctest --output-on-failure
