syntax = "proto3";

package sensor_msgs;

import "std_msgs.proto";

// Image message - represents a camera frame
message Image {
  std_msgs.Header header = 1;
  
  uint32 height = 2;          // Image height (rows)
  uint32 width = 3;           // Image width (columns)
  string encoding = 4;        // Pixel encoding (e.g., "8UC3", "mono8", "bgr8")
  bool is_bigendian = 5;      // Is data bigendian?
  uint32 step = 6;            // Row length in bytes
  bytes data = 7;             // Actual image data
}

// IMU message - accelerometer and gyroscope data
message Imu {
  std_msgs.Header header = 1;
  
  // Orientation (quaternion)
  std_msgs.Quaternion orientation = 2;
  repeated double orientation_covariance = 3;  // Row-major 3x3 matrix
  
  // Angular velocity (rad/s)
  std_msgs.Vector3 angular_velocity = 4;
  repeated double angular_velocity_covariance = 5;  // Row-major 3x3 matrix
  
  // Linear acceleration (m/s^2)
  std_msgs.Vector3 linear_acceleration = 6;
  repeated double linear_acceleration_covariance = 7;  // Row-major 3x3 matrix
}

// Camera intrinsic parameters
message CameraInfo {
  std_msgs.Header header = 1;
  
  uint32 height = 2;
  uint32 width = 3;
  
  string distortion_model = 4;  // "plumb_bob", "rational_polynomial", etc.
  repeated double d = 5;        // Distortion coefficients
  
  // Camera matrix (3x3, row-major)
  repeated double k = 6;        // K = [fx 0 cx; 0 fy cy; 0 0 1]
  
  // Rectification matrix (3x3, row-major) for stereo
  repeated double r = 7;
  
  // Projection matrix (3x4, row-major)
  repeated double p = 8;        // P = [fx' 0 cx' Tx; 0 fy' cy' Ty; 0 0 1 0]
  
  // Binning (subsampling)
  uint32 binning_x = 9;
  uint32 binning_y = 10;
}
